apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
  namespace: vulnerable-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      containers:
      - name: vulnerable-container
        image: nginx:1.14.0
        securityContext:
          privileged: true
          runAsUser: 0
          allowPrivilegeEscalation: true
        ports:
        - containerPort: 80
        env:
        - name: DB_PASSWORD
          value: "super_secret_password_123"
        volumeMounts:
        - name: host-root
          mountPath: /host
      volumes:
      - name: host-root
        hostPath:
          path: /